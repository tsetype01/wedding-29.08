<script>
  // URL обернут в кавычки — это важно для работы скрипта
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx3Ke2NyQRCEa0V0Syz2PYE2V9WeHzESuD63qHv21cUR9UTjiHDC-_7_GLHrGxfnTHY2g/exec'; 

  async function submitRSVP() {
    const name = document.getElementById('fullName').value.trim();
    const rsvp = document.querySelector('input[name="rsvp"]:checked');
    const btn = document.getElementById('submitBtn');

    // Простая проверка на заполненность
    if (!name) { alert('Аты-жөніңізді енгізіңіз / Пожалуйста, введите имя'); return; }
    if (!rsvp) { alert('Жауабыңызды таңдаңыз / Пожалуйста, выберите ответ'); return; }

    btn.disabled = true;
    btn.textContent = 'Жіберілуде... / Отправка...';

    const payload = {
      name: name,
      rsvp: rsvp.value,
      timestamp: new Date().toLocaleString('kk-KZ')
    };

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      
      alert('Жауабыңыз қабылданды! / Ваш ответ принят!');
      btn.textContent = 'Жіберілді / Отправлено';
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Жіберу / Отправить';
      alert('Қате орын алды, қайталап көріңіз / Произошла ошибка, попробуйте снова');
    }
  }
</script>
